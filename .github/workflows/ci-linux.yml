name: CI Linux

on:
  push:
    branches: [ master, main, dev ]
  pull_request:
    branches: [ master, main, dev ]

defaults:
  run:
    shell: bash

env:
  CMAKE_BUILD_TYPE: Release
  LINUX_SYSTEM_DEPS: >-
    libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev
    libxi-dev libxext-dev libwayland-dev libxkbcommon-dev libvulkan-dev
    fontconfig fonts-dejavu-core fonts-liberation

jobs:
  build-and-test:
    name: Qt Quick Terminal Surface (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${LINUX_SYSTEM_DEPS}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'linux_gcc_64'
          archives: 'icu qtbase qtdeclarative'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_TERMINAL_BUILD_BENCHMARKS=OFF \
            -DVNM_TERMINAL_ENABLE_PROFILING=OFF \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config ${CMAKE_BUILD_TYPE} --parallel

      - name: Run tests
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

      # The main build links vnm_msdf_text from source via FetchContent, which is
      # intentionally not an installable/exportable configuration (the MSDF install
      # guard in CMakeLists.txt fails closed so a source-built dependency is never
      # packaged into a broken consumer config). Validate the install and
      # package-consume path against a dedicated MSDF-disabled library build; an
      # MSDF-enabled package is a distribution build that supplies a packaged
      # vnm_msdf_text via -DVNM_TERMINAL_MSDF_TEXT_RENDERER_USE_SYSTEM_LIBS=ON.
      - name: Install package
        run: |
          cmake -B build-install -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DBUILD_TESTING=OFF \
            -DVNM_TERMINAL_BUILD_BENCHMARKS=OFF \
            -DVNM_TERMINAL_ENABLE_PROFILING=OFF \
            -DVNM_TERMINAL_ENABLE_MSDF_TEXT_RENDERER=OFF
          cmake --build build-install --config ${CMAKE_BUILD_TYPE} --parallel
          cmake --install build-install --config ${CMAKE_BUILD_TYPE} --prefix "${GITHUB_WORKSPACE}/install"

      - name: Configure package smoke
        run: |
          cmake -B package-smoke -S tests/package_smoke \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DCMAKE_PREFIX_PATH="${GITHUB_WORKSPACE}/install"

      - name: Build package smoke
        run: cmake --build package-smoke --config ${CMAKE_BUILD_TYPE} --parallel

  transcript-build-and-test:
    name: Qt Quick Terminal Surface Transcript (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${LINUX_SYSTEM_DEPS}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'linux_gcc_64'
          archives: 'icu qtbase qtdeclarative'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build-transcript -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_TERMINAL_BUILD_BENCHMARKS=OFF \
            -DVNM_TERMINAL_ENABLE_PROFILING=OFF \
            -DVNM_TERMINAL_ENABLE_TRANSCRIPT_CAPTURE_REPLAY=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build-transcript --config ${CMAKE_BUILD_TYPE} --parallel

      - name: Run tests
        working-directory: build-transcript
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure

  profiling-build-and-test:
    name: Qt Quick Terminal Surface Profiling (Linux)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ${LINUX_SYSTEM_DEPS}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.10.1'
          arch: 'linux_gcc_64'
          archives: 'icu qtbase qtdeclarative'
          cache: 'true'

      - name: Configure CMake
        run: |
          cmake -B build-profiling -S . \
            -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} \
            -DVNM_TERMINAL_BUILD_BENCHMARKS=OFF \
            -DVNM_TERMINAL_ENABLE_PROFILING=ON \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build-profiling --config ${CMAKE_BUILD_TYPE} --parallel

      - name: Run tests
        working-directory: build-profiling
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure
